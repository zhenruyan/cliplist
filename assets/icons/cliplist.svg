<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f3ed"/>
      <stop offset="100%" stop-color="#ece6db"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8aaa7e"/>
      <stop offset="100%" stop-color="#6b8e63"/>
    </linearGradient>
  </defs>

  <!-- clipboard body -->
  <rect x="8" y="6" width="32" height="38" rx="3" ry="3"
        fill="url(#paper)" stroke="#b5a99a" stroke-width="1.2"/>

  <!-- clipboard clip -->
  <rect x="16" y="3" width="16" height="7" rx="2" ry="2"
        fill="#c9bfb0" stroke="#a89888" stroke-width="1"/>

  <!-- text lines -->
  <line x1="14" y1="18" x2="34" y2="18"
        stroke="#c4b8a8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="14" y1="24" x2="30" y2="24"
        stroke="#c4b8a8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="14" y1="30" x2="26" y2="30"
        stroke="#c4b8a8" stroke-width="1.3" stroke-linecap="round"/>

  <!-- zen leaf accent -->
  <g transform="translate(30,31) rotate(-30)">
    <path d="M0,0 Q5,-8 0,-16 Q-5,-8 0,0 Z"
          fill="url(#leaf)" opacity="0.85"/>
    <line x1="0" y1="0" x2="0" y2="-14"
          stroke="#6b8e63" stroke-width="0.6" opacity="0.6"/>
  </g>
</svg>
